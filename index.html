<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Title</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
<main>
    <section class="hero-banner">
        <img class="hero-banner-image" src="./src/photo_2026-03-24_20-04-05.jpg" alt="">
    </section>
    <section class="content-container">
        <header class="header">
            <menu class="menu"></menu>
        </header>
        <section id="home" style="min-height: 0"></section>
        <section class="schedule" id="schedule">
            <div>Добро пожаловать на самый лучший и уютный танго марафон, который окунет вас в незабываемую атмосферу
                танца и радости.
            </div>
            <div class="registration">

                <a class="registration-link"
                   href="https://docs.google.com/forms/d/e/1FAIpQLSfApWGCC_BduoP8u1DqqrGhymY7cDQ-GyzcyqfneAbmnGBkUg/viewform?usp=header"
                   target="_blank">Зарегистрироваться</a>
            </div>

        </section>

        <section class="dg-team" id="dj-team">
            <h2>Dj Team</h2>
            <div class="djs"></div>
        </section>
        <section class="registration" id="registration">
            <h2>Registration</h2>

            <div>
                <a class="registration-link"
                   href="https://docs.google.com/forms/d/e/1FAIpQLSfApWGCC_BduoP8u1DqqrGhymY7cDQ-GyzcyqfneAbmnGBkUg/viewform?usp=header"
                   target="_blank">Зарегистрироваться</a>
            </div>
        </section>
    </section>
</main>

<template id="menu-template">
    <li><a href=""></a></li>
</template>

<template id="dj-group">
    <div class="dj-group"></div>
</template>

<template id="dj-card">
    <div class="card">
        <picture class="avatar-container">
            <img class="avatar" src="" alt="">
        </picture>
        <section class="tdj-info">
            <span class="name"></span>
            <span class="location"></span>
        </section>
    </div>
</template>
<script type="module" src="./scripts/script.js"></script>
</body>
</html>
